name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  appfeed:
    name: appfeed CLI tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: appfeed
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: appfeed/package-lock.json

      - run: npm ci
      - run: npm test

  site-validator:
    name: site validator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test site/validator.test.js

  schema:
    name: schema validates example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install jsonschema

      - name: Validate apps.example.json against apps.schema.json
        run: |
          python3 -c "
          import json, jsonschema
          schema = json.load(open('spec/apps.schema.json'))
          data   = json.load(open('spec/apps.example.json'))
          jsonschema.Draft202012Validator.check_schema(schema)
          jsonschema.Draft202012Validator(schema).validate(data)
          print('schema valid; example validates clean')
          "

  schema-sync:
    name: derived schema copies in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify appfeed/site schema copies match spec/apps.schema.json
        run: node scripts/sync-schemas.js --check
